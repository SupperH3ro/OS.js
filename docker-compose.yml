services:
  jabyos:
    build: .
    image: jabyos:latest
    container_name: jabyos
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - jabyos-vfs:/app/vfs
      - jabyos-sessions:/app/sessions
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jabyos.rule=Host(`os.kisscsabi.com`)"
      - "traefik.http.routers.jabyos.entrypoints=websecure"
      - "traefik.http.routers.jabyos.tls=true"
      - "traefik.http.routers.jabyos.tls.certresolver=letsencrypt"
      - "traefik.http.services.jabyos.loadbalancer.server.port=8000"
      - "jabyos.hidden=true"

volumes:
  jabyos-vfs:
  jabyos-sessions:

networks:
  proxy:
    external: true
